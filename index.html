<!DOCTYPE html>
<html>
<head>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; font-family: 'Courier New', monospace; overflow:hidden; }
canvas { display:block; }
#ui { position:absolute; top:0; left:0; width:100%; pointer-events:none; }
#hud { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; background:rgba(0,0,0,0.6); border-bottom:1px solid #1a3a6a; }
#lives-display { color:#ff4466; font-size:14px; font-weight:bold; }
#score-display { color:#00ffcc; font-size:14px; font-weight:bold; }
#high-score-display { color:#ffcc00; font-size:14px; }
#level-display { color:#cc88ff; font-size:14px; }
#prompt-bar { text-align:center; padding:8px 16px; background:rgba(0,20,50,0.85); border-bottom:1px solid #0a2a5a; min-height:54px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#prompt-label { color:#88aaff; font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
#prompt-text { color:#ffffff; font-size:18px; font-weight:bold; }
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,10,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; pointer-events:all; }
#overlay h1 { font-size:28px; color:#00ffcc; letter-spacing:4px; margin-bottom:8px; text-align:center; }
#overlay .sub { color:#88aaff; font-size:13px; margin-bottom:20px; text-align:center; max-width:420px; line-height:1.6; }
#overlay button { background:transparent; border:2px solid #00ffcc; color:#00ffcc; font-family:'Courier New',monospace; font-size:16px; padding:10px 32px; cursor:pointer; letter-spacing:2px; margin:6px; pointer-events:all; transition:all 0.2s; }
#overlay button:hover { background:#00ffcc; color:#0a0a1a; }
#score-history { margin-top:16px; text-align:center; max-width:380px; }
#score-history h3 { color:#ffcc00; font-size:13px; letter-spacing:2px; margin-bottom:8px; }
.score-row { color:#aaa; font-size:12px; padding:3px 0; border-bottom:1px solid #1a2a3a; display:flex; justify-content:space-between; gap:24px; }
.score-row span:last-child { color:#00ffcc; }
#flash-msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:22px; font-weight:bold; pointer-events:none; opacity:0; transition:opacity 0.2s; text-align:center; }
#topic-select { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
.topic-btn { background:transparent; border:1px solid #334; color:#aaa; font-family:'Courier New',monospace; font-size:11px; padding:5px 10px; cursor:pointer; letter-spacing:1px; pointer-events:all; transition:all 0.15s; }
.topic-btn.active { border-color:#00ffcc; color:#00ffcc; }
#controls-hint { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); color:#334; font-size:11px; letter-spacing:1px; pointer-events:none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div id="lives-display">♥♥♥</div>
    <div id="level-display">LEVEL 1</div>
    <div id="score-display">SCORE: 0</div>
    <div id="high-score-display">BEST: 0</div>
  </div>
  <div id="prompt-bar">
    <div id="prompt-label">SHOOT THE CORRECT TRANSLATION</div>
    <div id="prompt-text">—</div>
  </div>
</div>
<div id="flash-msg"></div>
<div id="controls-hint">← → MOVE &nbsp;|&nbsp; SPACE / TAP SHIP = SHOOT</div>
<div id="overlay">
  <h1>👾 ALIEN ESPAÑOL 👾</h1>
  <p class="sub">Move your cannon left and right, then shoot the alien with the correct translation!<br>← → to move &nbsp;|&nbsp; SPACE to shoot &nbsp;|&nbsp; tap ship on mobile</p>
  <div style="margin-bottom:12px; color:#ffcc00; font-size:12px; letter-spacing:2px;">SELECT TOPICS:</div>
  <div id="topic-select">
    <button class="topic-btn active" data-topic="rights">MIS DERECHOS</button>
    <button class="topic-btn active" data-topic="fairtrade">COMERCIO JUSTO</button>
    <button class="topic-btn active" data-topic="recycle">¡RECICLAMOS!</button>
    <button class="topic-btn active" data-topic="ciudad">MI CIUDAD</button>
  </div>
  <button id="startBtn">▶ PLAY</button>
  <div id="score-history">
    <h3>⭐ PREVIOUS SCORES</h3>
    <div id="score-list"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const flashMsg = document.getElementById('flash-msg');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const ALL_VOCAB = {
  rights: [
    {es:"tengo derecho a",en:"I have the right to"},
    {es:"no puedo",en:"I cannot"},
    {es:"a la educación",en:"to education"},
    {es:"a la libertad de expresión",en:"to freedom of expression"},
    {es:"a un medio ambiente sano",en:"to a healthy environment"},
    {es:"a vivir en armonía",en:"to live in harmony"},
    {es:"hay mucha violencia",en:"there is a lot of violence"},
    {es:"dar mi opinión",en:"give my opinion"},
    {es:"salir solo/a",en:"go out alone"},
    {es:"no es justo porque",en:"it isn't fair because"},
    {es:"es inaceptable porque",en:"it is unacceptable because"},
    {es:"puedo",en:"I can"},{es:"podemos",en:"we can"},{es:"puede",en:"he/she can"},
    {es:"boliviano/a",en:"Bolivian"},{es:"colombiano/a",en:"Colombian"},
    {es:"mexicano/a",en:"Mexican"},{es:"inglés/inglesa",en:"English"},{es:"español/a",en:"Spanish"},
  ],
  fairtrade: [
    {es:"tiene diez años",en:"he/she is ten years old"},
    {es:"vive con su familia",en:"he/she lives with his/her family"},
    {es:"trabaja para un patrón",en:"he/she works for an employer"},
    {es:"trabaja para una cooperativa",en:"he/she works for a cooperative"},
    {es:"el patrón",en:"the employer"},{es:"los beneficios",en:"the profits"},
    {es:"lo bueno es que",en:"the good thing is that"},
    {es:"lo malo es que",en:"the bad thing is that"},
    {es:"a partir de ahora",en:"from now on"},
    {es:"hay que trabajar",en:"you have to work"},
    {es:"gana treinta euros",en:"earns thirty euros"},
    {es:"seis días a la semana",en:"six days a week"},
    {es:"catorce horas al día",en:"fourteen hours a day"},
    {es:"no es justo",en:"it isn't fair"},
  ],
  recycle: [
    {es:"se debería",en:"you/we should"},{es:"no se debería",en:"you/we shouldn't"},
    {es:"reciclar el papel",en:"recycle paper"},{es:"ir en bici",en:"go by bike"},
    {es:"usar transporte público",en:"use public transport"},
    {es:"ahorrar energía en casa",en:"save energy at home"},
    {es:"apagar la luz",en:"turn off the light"},{es:"cerrar el grifo",en:"turn off the tap"},
    {es:"desenchufar los aparatos eléctricos",en:"unplug electrical devices"},
    {es:"malgastar el agua",en:"waste water"},
    {es:"tirar la basura al suelo",en:"throw rubbish on the ground"},
    {es:"ducharse en vez de bañarse",en:"have a shower instead of a bath"},
    {es:"usar bolsas de plástico",en:"use plastic bags"},
    {es:"conservar el agua",en:"save water"},
    {es:"para proteger el medio ambiente",en:"to protect the environment"},
  ],
  ciudad: [
    {es:"había mucha violencia",en:"there used to be a lot of violence"},
    {es:"era muy peligrosa",en:"it used to be very dangerous"},
    {es:"estaba sucia",en:"it used to be dirty"},
    {es:"no había nada para los jóvenes",en:"there was nothing for young people"},
    {es:"había mucha basura",en:"there used to be a lot of rubbish"},
    {es:"había mucha contaminación",en:"there used to be a lot of pollution"},
    {es:"ahora está limpia",en:"now it is clean"},
    {es:"hay menos basura",en:"there is less rubbish"},
    {es:"hay parques y espacios públicos",en:"there are parks and public spaces"},
    {es:"hay una red de transporte muy buena",en:"there is a very good transport network"},
    {es:"no tiene barrios peligrosos",en:"it doesn't have dangerous neighbourhoods"},
    {es:"van a construir",en:"they are going to build"},
    {es:"un polideportivo",en:"a sports centre"},
    {es:"el barrio",en:"the neighbourhood"},
    {es:"peligroso/a",en:"dangerous"},{es:"sucio/a",en:"dirty"},
    {es:"apasionante",en:"exciting / thrilling"},
    {es:"hay muchas cosas para los jóvenes",en:"there are lots of things for young people"},
    {es:"era (imperfect of ser)",en:"it used to be (nature)"},
    {es:"estaba (imperfect of estar)",en:"it used to be (location/condition)"},
    {es:"había (imperfect of haber)",en:"there used to be"},
    {es:"tenía (imperfect of tener)",en:"it used to have"},
  ]
};

let activeTopics = ['rights','fairtrade','recycle','ciudad'];
let vocab = [];
let score = 0, lives = 3, level = 1, highScore = 0;
let aliens = [], bullets = [], stars = [], explosions = [], particles = [];
let gameRunning = false;
let currentPrompt = null;
let frameCount = 0;
let alienSpeed = 0.7;
let scoreHistory = [];
let shootCooldown = 0;
let shieldFlash = 0;
let correctStreak = 0;
let roundOver = false;

// Ship state — now player-controlled
const ship = { x: 0, y: 0, w: 36, h: 28, spd: 4 };
const keys = {};

// Touch drag for mobile
let touchStartX = null;
let shipXAtTouchStart = null;

function loadStorage() {
  try {
    highScore = parseInt(localStorage.getItem('alienHS') || '0');
    scoreHistory = JSON.parse(localStorage.getItem('alienHistory') || '[]');
  } catch(e) {}
}
function saveStorage() {
  try {
    localStorage.setItem('alienHS', highScore);
    localStorage.setItem('alienHistory', JSON.stringify(scoreHistory.slice(0,10)));
  } catch(e) {}
}
function buildVocab() {
  vocab = [];
  activeTopics.forEach(t => { if(ALL_VOCAB[t]) vocab = vocab.concat(ALL_VOCAB[t]); });
  if(vocab.length < 4) vocab = Object.values(ALL_VOCAB).flat();
}
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function makeStars() {
  stars = [];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.3,spd:Math.random()*0.3+0.1});
}

function spawnNewRound() {
  aliens = [];
  bullets = [];
  roundOver = false;
  const pool = shuffle([...vocab]).slice(0, 3 + Math.min(level-1,3));
  const correctItem = pool[Math.floor(Math.random()*pool.length)];
  const type = Math.random()<0.5 ? 'en2es' : 'es2en';
  const prompt = type==='en2es' ? correctItem.en : correctItem.es;
  const answer = type==='en2es' ? correctItem.es : correctItem.en;
  currentPrompt = { prompt, answer, type };

  document.getElementById('prompt-label').textContent = type==='en2es' ? 'SHOOT THE SPANISH TRANSLATION →' : 'SHOOT THE ENGLISH TRANSLATION →';
  document.getElementById('prompt-text').textContent = prompt;

  const others = vocab.filter(v => v !== correctItem);
  shuffle(others);
  const distractors = others.slice(0, pool.length-1).map(v => type==='en2es' ? v.es : v.en);
  const allAnswers = shuffle([answer, ...distractors]);
  const spacing = canvas.width / (allAnswers.length + 1);
  const HUD_H = 96;

  allAnswers.forEach((ans, i) => {
    aliens.push({
      id: Math.random(), text: ans,
      x: spacing*(i+1), y: HUD_H + 20,
      w: Math.min(Math.max(ans.length*8+20, 100), 260), h: 38,
      spd: alienSpeed + Math.random()*0.3,
      color: `hsl(${Math.floor(Math.random()*60+200)},80%,60%)`,
      correct: ans === answer,
      legPhase: Math.random()*Math.PI*2,
      wobble: (Math.random()-0.5)*0.8,
    });
  });
}

// ── Draw helpers ──────────────────────────────────────────────
function drawAlien(a) {
  const {x,y,w,h,color,legPhase,text} = a;
  const lp = legPhase + frameCount*0.08;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  for(let i=0;i<4;i++){
    const lx = x-w/2+(w/3)*i+w/6;
    ctx.beginPath(); ctx.moveTo(lx,y+h/2); ctx.lineTo(lx,y+h/2+8+Math.sin(lp+i)*5); ctx.stroke();
  }
  ctx.fillStyle = color+'33'; ctx.strokeStyle = color; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x-w/2,y-h/2,w,h,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#000a';
  ctx.beginPath(); ctx.ellipse(x,y-h/2+4,w*0.3,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0ff8';
  ctx.beginPath(); ctx.arc(x-w*0.1,y-h/2+4,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*0.1,y-h/2+4,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(13,Math.floor(w/text.length*1.3)+6)}px 'Courier New'`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.save(); ctx.beginPath(); ctx.rect(x-w/2+6,y-h/2+2,w-12,h-4); ctx.clip();
  ctx.fillText(text,x,y+2); ctx.restore();
  ctx.restore();
}

function drawShip() {
  const {x,y,w,h} = ship;
  ctx.save();
  if(shieldFlash>0){ ctx.shadowColor='#ff4466'; ctx.shadowBlur=18; }
  // base
  ctx.fillStyle='#00ffcc';
  ctx.beginPath(); ctx.moveTo(x,y-h/2); ctx.lineTo(x-w/2,y+h/2); ctx.lineTo(x+w/2,y+h/2); ctx.closePath(); ctx.fill();
  // cockpit
  ctx.fillStyle='#006655';
  ctx.beginPath(); ctx.ellipse(x,y,w*0.2,h*0.25,0,0,Math.PI*2); ctx.fill();
  // barrel (cannon tip) — visual indicator of where bullet will come from
  ctx.fillStyle='#00ffcc';
  ctx.fillRect(x-3, y-h/2-12, 6, 14);
  ctx.fillStyle='#00ddaa';
  ctx.fillRect(x-5, y-h/2-14, 10, 5);
  // thruster
  ctx.fillStyle='#00ffcc88';
  ctx.beginPath(); ctx.moveTo(x-w*0.15,y+h/2); ctx.lineTo(x,y+h/2+8+Math.sin(frameCount*0.2)*4); ctx.lineTo(x+w*0.15,y+h/2); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle='#ffff44'; ctx.shadowColor='#ffff00'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.ellipse(b.x,b.y,3,7,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawExplosion(e) {
  e.rings.forEach(r=>{
    ctx.save(); ctx.globalAlpha=r.alpha; ctx.strokeStyle=r.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(e.x,e.y,r.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
  });
}
function drawParticle(p) {
  ctx.save(); ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function spawnExplosion(x,y,correct) {
  const colors = correct ? ['#00ffcc','#88ffdd','#ffffff'] : ['#ff4466','#ff8800','#ffff00'];
  explosions.push({x,y,rings:colors.map((c,i)=>({r:5,color:c,alpha:1})),correct});
  for(let i=0;i<18;i++){
    const ang=Math.random()*Math.PI*2,spd=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:Math.random()*3+1,color:colors[Math.floor(Math.random()*colors.length)],alpha:1});
  }
}
function showFlash(txt,color){ flashMsg.textContent=txt; flashMsg.style.color=color; flashMsg.style.opacity='1'; setTimeout(()=>{flashMsg.style.opacity='0';},700); }
function updateHUD(){
  document.getElementById('lives-display').textContent='♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
  document.getElementById('score-display').textContent='SCORE: '+score;
  document.getElementById('high-score-display').textContent='BEST: '+highScore;
  document.getElementById('level-display').textContent='LEVEL '+level;
}
function checkLevelUp(){
  if(score >= level*80 && level<10){
    level++;
    alienSpeed = 0.7+(level-1)*0.25;
    showFlash('LEVEL '+level+'! 🚀','#cc88ff');
    setTimeout(()=>{ if(gameRunning) spawnNewRound(); },600);
    return true;
  }
  return false;
}

// ── Input ─────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='Space'){ e.preventDefault(); fireBullet(); }
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });

// Mobile: drag left/right to move ship, tap on ship to shoot
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx = e.touches[0].clientX - rect.left;
  const ty = e.touches[0].clientY - rect.top;
  touchStartX = tx;
  shipXAtTouchStart = ship.x;
  // tap near ship = shoot
  if(Math.abs(tx - ship.x) < 60 && Math.abs(ty - ship.y) < 60) fireBullet();
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(touchStartX===null) return;
  const rect = canvas.getBoundingClientRect();
  const tx = e.touches[0].clientX - rect.left;
  const dx = tx - touchStartX;
  ship.x = Math.max(ship.w/2+5, Math.min(canvas.width-ship.w/2-5, shipXAtTouchStart + dx));
},{passive:false});

canvas.addEventListener('touchend', e=>{ touchStartX=null; },{passive:false});

function fireBullet(){
  if(!gameRunning || shootCooldown>0 || roundOver) return;
  bullets.push({x:ship.x, y:ship.y-ship.h/2-14});
  shootCooldown=15;
}

// ── Main loop ─────────────────────────────────────────────────
function gameLoop(){
  if(!gameRunning) return;
  frameCount++;
  shieldFlash=Math.max(0,shieldFlash-1);
  if(shootCooldown>0) shootCooldown--;

  // Move ship
  const margin = ship.w/2+5;
  if(keys['ArrowLeft']||keys['KeyA']) ship.x=Math.max(margin, ship.x-ship.spd);
  if(keys['ArrowRight']||keys['KeyD']) ship.x=Math.min(canvas.width-margin, ship.x+ship.spd);
  ship.y = canvas.height-60;

  // Draw background
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.y+=s.spd; if(s.y>canvas.height) s.y=0;
    ctx.fillStyle=`rgba(200,220,255,${s.r/2})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });

  // Aim line — shows where bullet will travel
  if(!roundOver){
    ctx.save();
    ctx.setLineDash([4,8]);
    ctx.strokeStyle='rgba(0,255,204,0.12)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(ship.x, ship.y-ship.h/2-14); ctx.lineTo(ship.x, 96); ctx.stroke();
    ctx.restore();
  }

  // Explosions & particles
  explosions.forEach(e=>{
    e.rings.forEach(r=>{ r.r+=2.5; r.alpha=Math.max(0,r.alpha-0.06); });
    drawExplosion(e);
  });
  explosions=explosions.filter(e=>e.rings[0].alpha>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.alpha=Math.max(0,p.alpha-0.04); drawParticle(p); });
  particles=particles.filter(p=>p.alpha>0);

  // Aliens
  if(!roundOver){
    aliens.forEach(a=>{ a.y+=a.spd; a.x+=Math.sin(frameCount*0.03+a.legPhase)*a.wobble; });
  }
  aliens.forEach(a=>drawAlien(a));

  // Bullets
  bullets.forEach(b=>{ b.y-=11; });
  bullets=bullets.filter(b=>b.y>80);

  // Bullet-alien collision
  if(!roundOver){
    outer: for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];
      for(let ai=aliens.length-1;ai>=0;ai--){
        const a=aliens[ai];
        if(Math.abs(b.x-a.x)<a.w/2 && Math.abs(b.y-a.y)<a.h/2){
          roundOver=true;
          spawnExplosion(a.x,a.y,a.correct);
          bullets.splice(bi,1);
          aliens.splice(ai,1);
          updateHUD();
          if(a.correct){
            score+=10+level*2; correctStreak++;
            if(correctStreak>=3){score+=5;showFlash('COMBO x'+correctStreak+'! +5','#ffff00');}
            else showFlash('¡CORRECTO! +'+(10+level*2),'#00ffcc');
            if(!checkLevelUp()) setTimeout(()=>{ if(gameRunning) spawnNewRound(); },500);
          } else {
            lives--; correctStreak=0; shieldFlash=20;
            showFlash('✗ INCORRECTO!','#ff4466');
            document.getElementById('prompt-bar').style.background='rgba(80,0,20,0.85)';
            setTimeout(()=>{ document.getElementById('prompt-bar').style.background='rgba(0,20,50,0.85)'; },500);
            if(lives<=0){ setTimeout(endGame,600); }
            else setTimeout(()=>{ if(gameRunning) spawnNewRound(); },700);
          }
          updateHUD();
          break outer;
        }
      }
    }
  }

  // Alien reaches bottom
  if(!roundOver){
    for(let i=aliens.length-1;i>=0;i--){
      if(aliens[i].y>canvas.height-40){
        const a=aliens[i];
        spawnExplosion(a.x,a.y,false);
        if(a.correct){
          roundOver=true; lives--; correctStreak=0; shieldFlash=20;
          showFlash('TOO SLOW! ♥ -1','#ff8800');
          aliens.splice(i,1); updateHUD();
          if(lives<=0){ setTimeout(endGame,500); }
          else setTimeout(()=>{ if(gameRunning) spawnNewRound(); },600);
        } else {
          aliens.splice(i,1);
        }
        break;
      }
    }
  }

  bullets.forEach(b=>drawBullet(b));
  drawShip();
  requestAnimationFrame(gameLoop);
}

function startGame(){
  buildVocab();
  score=0; lives=3; level=1; frameCount=0; aliens=[]; bullets=[]; explosions=[]; particles=[];
  alienSpeed=0.7; correctStreak=0; shieldFlash=0; shootCooldown=0; roundOver=false;
  ship.x=canvas.width/2; ship.spd=12;
  makeStars();
  overlay.style.display='none';
  gameRunning=true;
  updateHUD();
  spawnNewRound();
  gameLoop();
}

function endGame(){
  gameRunning=false;
  if(score>highScore) highScore=score;
  scoreHistory.unshift({score,level,date:new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'})});
  saveStorage();
  showEndScreen();
}

function showEndScreen(){
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>GAME OVER</h1>
    <p class="sub" style="font-size:22px;color:#ffcc00;">Score: <b>${score}</b> &nbsp;|&nbsp; Level: <b>${level}</b></p>
    <p class="sub">High Score: ${highScore}</p>
    <button id="restartBtn">▶ PLAY AGAIN</button>
    <button id="menuBtn">☰ MENU</button>
    <div style="margin-top:18px;max-width:340px;">
      <h3 style="color:#ffcc00;font-size:13px;letter-spacing:2px;margin-bottom:8px;">⭐ SCORE HISTORY</h3>
      ${scoreHistory.slice(0,8).map((s,i)=>`<div style="color:#aaa;font-size:12px;padding:3px 0;border-bottom:1px solid #1a2a3a;display:flex;justify-content:space-between;gap:24px;"><span>${i+1}. ${s.date} — Lvl ${s.level}</span><span style="color:#00ffcc;">${s.score} pts</span></div>`).join('')}
    </div>`;
  document.getElementById('restartBtn').onclick=startGame;
  document.getElementById('menuBtn').onclick=showMenu;
}

function showMenu(){
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>👾 ALIEN ESPAÑOL 👾</h1>
    <p class="sub">Move your cannon left and right, then shoot the alien with the correct translation!<br>← → to move &nbsp;|&nbsp; SPACE to shoot &nbsp;|&nbsp; drag & tap on mobile</p>
    <div style="margin-bottom:12px;color:#ffcc00;font-size:12px;letter-spacing:2px;">SELECT TOPICS:</div>
    <div id="topic-select" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;">
      ${['rights','fairtrade','recycle','ciudad'].map(t=>`<button class="topic-btn ${activeTopics.includes(t)?'active':''}" data-topic="${t}" style="background:transparent;border:1px solid ${activeTopics.includes(t)?'#00ffcc':'#334'};color:${activeTopics.includes(t)?'#00ffcc':'#aaa'};font-family:'Courier New',monospace;font-size:11px;padding:5px 10px;cursor:pointer;letter-spacing:1px;pointer-events:all;">${t==='rights'?'MIS DERECHOS':t==='fairtrade'?'COMERCIO JUSTO':t==='recycle'?'¡RECICLAMOS!':'MI CIUDAD'}</button>`).join('')}
    </div>
    <button id="startBtn2" style="background:transparent;border:2px solid #00ffcc;color:#00ffcc;font-family:'Courier New',monospace;font-size:16px;padding:10px 32px;cursor:pointer;letter-spacing:2px;pointer-events:all;">▶ PLAY</button>
    <div style="margin-top:16px;text-align:center;max-width:380px;">
      <h3 style="color:#ffcc00;font-size:13px;letter-spacing:2px;margin-bottom:8px;">⭐ PREVIOUS SCORES</h3>
      ${scoreHistory.slice(0,8).map((s,i)=>`<div style="color:#aaa;font-size:12px;padding:3px 0;border-bottom:1px solid #1a2a3a;display:flex;justify-content:space-between;gap:24px;"><span>${i+1}. ${s.date} — Lvl ${s.level}</span><span style="color:#00ffcc;">${s.score}</span></div>`).join('')}
    </div>`;
  document.querySelectorAll('.topic-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.topic;
      if(activeTopics.includes(t)){
        if(activeTopics.length>1){activeTopics=activeTopics.filter(x=>x!==t);btn.style.borderColor='#334';btn.style.color='#aaa';}
      } else {
        activeTopics.push(t);btn.style.borderColor='#00ffcc';btn.style.color='#00ffcc';
      }
    });
  });
  document.getElementById('startBtn2').onclick=startGame;
}

loadStorage();
document.getElementById('startBtn').onclick=startGame;
document.querySelectorAll('.topic-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.topic;
    if(activeTopics.includes(t)){
      if(activeTopics.length>1){activeTopics=activeTopics.filter(x=>x!==t);btn.style.borderColor='#334';btn.style.color='#aaa';}
    } else {
      activeTopics.push(t);btn.style.borderColor='#00ffcc';btn.style.color='#00ffcc';
    }
  });
});
const scoreList=document.getElementById('score-list');
if(scoreList) scoreList.innerHTML=scoreHistory.slice(0,8).map((s,i)=>`<div style="color:#aaa;font-size:12px;padding:3px 0;border-bottom:1px solid #1a2a3a;display:flex;justify-content:space-between;gap:24px;"><span>${i+1}. ${s.date}</span><span style="color:#00ffcc;">${s.score}</span></div>`).join('');
makeStars();
function menuBg(){ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.y+=s.spd*0.5;if(s.y>canvas.height)s.y=0;ctx.fillStyle=`rgba(200,220,255,${s.r/2})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});if(!gameRunning)requestAnimationFrame(menuBg);}
menuBg();
</script>
</body>
</html>
